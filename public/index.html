<!DOCTYPE html>
<html lang="zh-Hant">

<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
  <meta http-equiv="Pragma" content="no-cache" />
  <meta http-equiv="Expires" content="0" />
  <title>Correction — 文件校正</title>

  <!-- Materialize CSS -->
  <link rel="stylesheet" href="https://fonts.googleapis.com/icon?family=Material+Icons">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/materialize/1.0.0/css/materialize.min.css" />

  <!-- 依賴 -->
  <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/materialize/1.0.0/js/materialize.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/lodash@4.17.21/lodash.min.js"></script>

  <!-- CorrectionLib -->
  <script src="./correction-lib.js"></script>

  <style>
    body { padding-bottom: 40px; }
    header { position: sticky; top: 0; z-index: 1000; }
    .container.wide { width: 94%; max-width: 1400px; }

    .drop-zone {
      border: 2px dashed #b0bec5;
      border-radius: 8px;
      padding: 18px;
      margin: 4px 0 12px;
      text-align: center;
      color: #607d8b;
      cursor: pointer;
      transition: background .15s, border-color .15s, color .15s;
    }
    .drop-zone .material-icons { vertical-align: middle; margin-right: 6px; }
    .drop-zone.dragover { background: #e0f2f1; border-color: #26a69a; color: #00897b; }

    textarea.doc {
      width: 100%;
      min-height: 360px;
      resize: vertical;
      font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", monospace;
      font-size: .95rem;
      line-height: 1.6;
      padding: 10px;
      border: 1px solid #e0e0e0;
      border-radius: 4px;
      box-sizing: border-box;
      background: #fafafa;
    }
    .card .card-title { font-size: 1.2rem; }
    .meta { font-size: .85rem; color: #757575; }
    .stats { max-height: 200px; overflow: auto; margin-top: 10px; }
    .stats table { font-size: .85rem; }
    .toolbar { display: flex; gap: 12px; align-items: center; flex-wrap: wrap; }
    .toolbar .input-field { margin: 0; flex: 1 1 260px; min-width: 220px; }
  </style>

  <link rel="stylesheet" href="./side-tool.css">

</head>

<body>
  <header>
    <nav>
      <div class="nav-wrapper teal">
        <a class="brand-logo" style="padding-left:16px;">
          <i class="material-icons left">spellcheck</i>Correction
        </a>
        <ul class="right hide-on-med-and-down">
          <li><a id="builderLink" href="./correction-data-builder.html" target="_blank" rel="noopener"><i class="material-icons left">build</i>編輯校正字集</a></li>
          <li style="width:16px;">&nbsp;</li>
        </ul>
      </div>
    </nav>
  </header>

  <div class="container wide" style="margin-top:20px;">

    <!-- 控制列：選擇校正字集 + 執行 -->
    <div class="card">
      <div class="card-content" style="padding:16px 24px;">
        <div class="toolbar">
          <div class="input-field">
            <select id="sourceSelect">
              <option value="" disabled selected>載入中…</option>
            </select>
            <label>校正資料來源（correction-data）</label>
          </div>
          <a id="btnRun" class="btn teal waves-effect waves-light disabled">
            <i class="material-icons left">play_arrow</i>執行校正
          </a>
          <a id="btnReload" class="btn-flat waves-effect disabled" title="重新載入目前使用的校正資料來源">
            <i class="material-icons left">refresh</i>重新載入
          </a>
          <span id="sourceMeta" class="meta"></span>
        </div>
      </div>
    </div>

    <div class="row">
      <!-- 左：原始 / 上傳內容 -->
      <div class="col s12 l6">
        <div class="card">
          <div class="card-content">
            <span class="card-title">原始內容
              <span id="origInfo" class="meta"></span>
            </span>
            <div id="dropZone" class="drop-zone">
              <i class="material-icons">cloud_upload</i>
              拖拉檔案到這裡，或<u>點擊選擇檔案</u>上傳至 /upload/correction
            </div>
            <input type="file" id="filePicker" accept=".txt,.md,.text,.csv,.json,.srt,.vtt,text/*" style="display:none;">
            <textarea id="original" class="doc" placeholder="上傳檔案後內容會顯示在這裡，也可以直接貼上文字…"></textarea>
          </div>
        </div>
      </div>

      <!-- 右：校正結果 -->
      <div class="col s12 l6">
        <div class="card">
          <div class="card-content">
            <span class="card-title">校正結果
              <span id="resultInfo" class="meta"></span>
            </span>
            <textarea id="result" class="doc" placeholder="按「執行校正」後，結果會顯示在這裡…" readonly></textarea>
            <div class="stats" id="stats"></div>
          </div>
          <div class="card-action">
            <a id="btnCopy" class="btn-flat waves-effect disabled"><i class="material-icons left">content_copy</i>複製內容</a>
            <a id="btnDownload" class="btn-flat waves-effect disabled"><i class="material-icons left">file_download</i>下載</a>
          </div>
        </div>
      </div>
    </div>
  </div>

  <!-- 右側工具列  -->
  <div id="setting-file_download" class="side-tool">
    <i class="material-icons" style="font-size: 20px;">file_download</i>
  </div>

  <div id="setting-copy" class="side-tool">
    <i class="material-icons" style="font-size: 20px;">content_copy</i>
  </div>

  <script>
    let main = {
      event: {
        binding: function () {
          $(".side-tool").click(function (e) {
            e.preventDefault();
            main.event.setIconDone($(this));
          });

          $("#setting-copy").click(function (e) {
            e.preventDefault();
            $('#btnCopy').click();
          });

          $("#setting-file_download").click(function (e) {
            e.preventDefault();
            $('#btnDownload').click();
          });

          return;
        },
        setIconDone: function (element) {
          let f_icon = element.find('i').text();
          element.find('i').text("check");
          setTimeout(() => {
            element.find('i').text(f_icon);
          }, 800);
        },
      },
      init: function () {
        // Placeholder; will be replaced by module
        console.info(">>> Main init called");
        main.event.binding();
        return;
      }
    };

    $(function () {
      var BASE = './correction-data/';
      var state = {
        filename: 'corrected.txt',   // 用於下載命名
        rules: null,                 // 已載入的校正字集
        sources: []                  // 清單
      };

      var $select = $('#sourceSelect');
      var $run = $('#btnRun');
      var $copy = $('#btnCopy');
      var $download = $('#btnDownload');

      // ---- 載入資料來源清單 ----
      CorrectionLib.loadList('./correction-data.json').then(function (list) {
        state.sources = list;
        $select.empty();
        $select.append('<option value="" disabled selected>請選擇校正資料來源…</option>');
        list.forEach(function (item, idx) {
          var label = (Array.isArray(item.alias) ? item.alias.join(' / ') : item.alias) || item.file;
          $select.append($('<option>').val(idx).text(label));
        });
        $select.formSelect();
      }).catch(function (err) {
        $select.empty().append('<option value="" disabled selected>清單載入失敗</option>').formSelect();
        M.toast({ html: '清單載入失敗：' + err.message, classes: 'red' });
      });

      // 載入目前選擇的字集 rules（change 與「重新載入」共用）
      function loadCurrentSource(showToast) {
        var idx = parseInt($select.val(), 10);
        var item = state.sources[idx];
        if (!item) return;
        // 讓「編輯校正字集」連結帶上目前選擇的 correction-data
        $('#builderLink').attr('href', './correction-data-builder.html?file=' + encodeURIComponent(item.file));
        $('#sourceMeta').text('載入中…');
        return CorrectionLib.loadSource(item.file, BASE).then(function (rules) {
          state.rules = rules;
          var desc = item.description ? ' — ' + item.description : '';
          $('#sourceMeta').text('共 ' + rules.length + ' 條規則' + desc);
          maybeEnableRun();
          if (showToast) {
            M.toast({ html: '已重新載入：' + item.file + '（' + rules.length + ' 條規則）', classes: 'teal' });
          }
        }).catch(function (err) {
          state.rules = null;
          $('#sourceMeta').text('');
          M.toast({ html: '字集載入失敗：' + err.message, classes: 'red' });
        });
      }

      // 選擇字集 → 載入 rules，並啟用「重新載入」
      $select.on('change', function () {
        $('#btnReload').toggleClass('disabled', !state.sources[parseInt($select.val(), 10)]);
        loadCurrentSource(false);
      });

      // 重新載入目前使用中的 correction-data（在 builder 改完後可即時更新）
      $('#btnReload').on('click', function () {
        if ($(this).hasClass('disabled')) return;
        loadCurrentSource(true);
      });

      // ---- 上傳 / 讀取檔案 ----
      var $drop = $('#dropZone');
      var $picker = $('#filePicker');

      $drop.on('dragenter dragover', function (e) {
        e.preventDefault(); e.stopPropagation(); $drop.addClass('dragover');
      });
      $drop.on('dragleave dragend drop', function (e) {
        e.preventDefault(); e.stopPropagation(); $drop.removeClass('dragover');
      });
      $drop.on('drop', function (e) {
        var files = e.originalEvent.dataTransfer.files;
        if (files && files.length) handleFile(files[0]);
      });
      $drop.on('click', function () { $picker.click(); });
      $picker.on('change', function (e) {
        if (e.target.files && e.target.files.length) handleFile(e.target.files[0]);
        $picker.val('');
      });

      function handleFile(file) {
        state.filename = file.name || 'corrected.txt';
        $('#origInfo').text('（' + file.name + '）');
        // 1) 即時讀取內容顯示
        var reader = new FileReader();
        reader.onload = function () {
          $('#original').val(reader.result);
          M.textareaAutoResize($('#original'));
          maybeEnableRun();
        };
        reader.onerror = function () {
          M.toast({ html: '讀取檔案失敗', classes: 'red' });
        };
        reader.readAsText(file, 'UTF-8');

        // 2) 上傳到 /upload/correction 資料夾
        var fd = new FormData();
        fd.append('myFiles', file);
        $.ajax({
          url: '/api/upload?folder=correction',
          type: 'POST', data: fd, processData: false, contentType: false
        }).done(function (resp) {
          if (resp && resp.success) {
            M.toast({ html: '已上傳至 /upload/correction：' + file.name, classes: 'green' });
          } else {
            M.toast({ html: '上傳失敗：' + ((resp && resp.error) || '未知錯誤'), classes: 'orange' });
          }
        }).fail(function (xhr) {
          var msg = (xhr.responseJSON && xhr.responseJSON.error) || xhr.statusText || '上傳失敗';
          M.toast({ html: '上傳失敗：' + msg, classes: 'orange' });
        });
      }

      function maybeEnableRun() {
        var ready = !!state.rules && $('#original').val().length > 0;
        $run.toggleClass('disabled', !ready);
      }
      $('#original').on('input', maybeEnableRun);

      // ---- 執行校正 ----
      $run.on('click', function () {
        if ($run.hasClass('disabled')) return;
        var text = $('#original').val();
        var res = CorrectionLib.apply(text, state.rules || []);
        $('#result').val(res.text);
        M.textareaAutoResize($('#result'));
        $('#resultInfo').text('（替換 ' + res.total + ' 處）');
        renderStats(res.stats);
        $copy.toggleClass('disabled', !res.text.length);
        $download.toggleClass('disabled', !res.text.length);
        M.toast({ html: '校正完成，共替換 ' + res.total + ' 處', classes: res.total ? 'teal' : 'grey' });
      });

      function renderStats(stats) {
        var $s = $('#stats');
        if (!stats.length) { $s.html('<p class="meta">沒有任何替換。</p>'); return; }
        var rows = stats.map(function (s) {
          return '<tr><td>' + _.escape(s.source) + '</td><td>→</td><td>' +
            _.escape(s.target) + '</td><td class="right-align">' + s.count + '</td></tr>';
        }).join('');
        $s.html(
          '<table class="striped"><thead><tr><th>原字詞</th><th></th><th>校正為</th><th class="right-align">次數</th></tr></thead>' +
          '<tbody>' + rows + '</tbody></table>'
        );
      }

      // ---- 複製內容 ----
      $copy.on('click', function () {
        if ($copy.hasClass('disabled')) return;
        var text = $('#result').val();
        var done = function () { M.toast({ html: '已複製到剪貼簿', classes: 'green' }); };
        if (navigator.clipboard && navigator.clipboard.writeText) {
          navigator.clipboard.writeText(text).then(done).catch(fallbackCopy);
        } else { fallbackCopy(); }
        function fallbackCopy() {
          var $t = $('#result');
          $t.prop('readonly', false).focus().select();
          try { document.execCommand('copy'); done(); }
          catch (e) { M.toast({ html: '複製失敗，請手動選取', classes: 'red' }); }
          $t.prop('readonly', true);
        }
      });

      // ---- 下載（原檔名 + 校正日期 yyyyMMddHHmmss）----
      $download.on('click', function () {
        if ($download.hasClass('disabled')) return;
        var text = $('#result').val();
        var name = CorrectionLib.stampFilename(state.filename, CorrectionLib.timestamp());
        var blob = new Blob([text], { type: 'text/plain;charset=utf-8' });
        var url = URL.createObjectURL(blob);
        var a = document.createElement('a');
        a.href = url; a.download = name;
        document.body.appendChild(a); a.click(); document.body.removeChild(a);
        setTimeout(function () { URL.revokeObjectURL(url); }, 1000);
        M.toast({ html: '已下載：' + name, classes: 'teal' });
      });
    });

    $(document).ready(function () {
      console.info(">>> jQuery loaded, version:", $.fn.jquery);
      main.init();
    });

</script>
</body>
</html>
