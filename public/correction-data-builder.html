<!DOCTYPE html>
<html lang="zh-Hant">

<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
  <meta http-equiv="Pragma" content="no-cache" />
  <meta http-equiv="Expires" content="0" />
  <title>Correction — 編輯校正字集</title>

  <!-- Materialize CSS -->
  <link rel="stylesheet" href="https://fonts.googleapis.com/icon?family=Material+Icons">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/materialize/1.0.0/css/materialize.min.css" />

  <!-- 依賴 -->
  <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/materialize/1.0.0/js/materialize.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/lodash@4.17.21/lodash.min.js"></script>

  <!-- CorrectionLib -->
  <script src="./correction-lib.js"></script>

  <style>
    body { padding-bottom: 80px; }
    header { position: sticky; top: 0; z-index: 1000; }
    .container.wide { width: 94%; max-width: 1100px; }
    .toolbar { display: flex; gap: 12px; align-items: center; flex-wrap: wrap; }
    .toolbar .input-field { margin: 0; flex: 1 1 280px; min-width: 240px; }

    table.entries { table-layout: fixed; }
    table.entries th, table.entries td { padding: 8px; vertical-align: top; }
    table.entries .col-src { width: 45%; }
    table.entries .col-tgt { width: 35%; }
    table.entries .col-act { width: 64px; text-align: center; }
    table.entries textarea {
      min-height: 60px; margin: 0; padding: 8px; box-sizing: border-box;
      border: 1px solid #e0e0e0; border-radius: 4px; width: 100%;
      font-family: ui-monospace, Menlo, Monaco, Consolas, monospace; font-size: .9rem;
    }
    table.entries input.tgt {
      margin: 0; height: 2.6rem; border: 1px solid #e0e0e0; border-radius: 4px;
      padding: 0 8px; box-sizing: border-box; width: 100%;
    }
    .hint { font-size: .82rem; color: #9e9e9e; }
    .save-bar {
      position: fixed; bottom: 0; left: 0; right: 0; background: #fff;
      border-top: 1px solid #e0e0e0; padding: 10px 24px; z-index: 999;
      display: flex; gap: 12px; align-items: center;
    }
    .save-bar .spacer { flex: 1; }
  </style>
</head>

<body>
  <header>
    <nav>
      <div class="nav-wrapper deep-orange darken-1">
        <a class="brand-logo" style="padding-left:16px;">
          <i class="material-icons left">build</i>校正字集編輯
        </a>
        <ul class="right hide-on-med-and-down">
          <li><a href="./index.html"><i class="material-icons left">spellcheck</i>回校正頁</a></li>
          <li style="width:16px;">&nbsp;</li>
        </ul>
      </div>
    </nav>
  </header>

  <div class="container wide" style="margin-top:20px;">
    <div class="card">
      <div class="card-content" style="padding:16px 24px;">
        <div class="toolbar">
          <div class="input-field">
            <select id="sourceSelect">
              <option value="" disabled selected>載入中…</option>
            </select>
            <label>選擇校正資料來源（correction-data）</label>
          </div>
          <a id="btnNewSource" class="btn-flat waves-effect">
            <i class="material-icons left">add_circle</i>新增資料來源
          </a>
          <span id="fileMeta" class="hint"></span>
        </div>
      </div>
    </div>

    <div class="card" id="editorCard" style="display:none;">
      <div class="card-content">
        <span class="card-title">條目編輯
          <span class="hint">— <code>source</code> 每行一個字詞，皆會被替換成 <code>target</code></span>
        </span>
        <table class="entries striped">
          <thead>
            <tr>
              <th class="col-src">source（原字詞，每行一個）</th>
              <th class="col-tgt">target（校正為）</th>
              <th class="col-act"></th>
            </tr>
          </thead>
          <tbody id="entryBody"></tbody>
        </table>
        <a id="btnAddRow" class="btn-flat waves-effect teal-text" style="margin-top:8px;">
          <i class="material-icons left">add</i>新增條目
        </a>
      </div>
    </div>
  </div>

  <!-- 儲存列 -->
  <div class="save-bar" id="saveBar" style="display:none;">
    <span id="saveStatus" class="hint"></span>
    <span class="spacer"></span>
    <a id="btnReload" class="btn-flat waves-effect"><i class="material-icons left">refresh</i>重新載入</a>
    <a id="btnSave" class="btn deep-orange waves-effect waves-light"><i class="material-icons left">save</i>儲存</a>
  </div>

  <!-- 新增資料來源 Modal -->
  <div id="newSourceModal" class="modal">
    <div class="modal-content">
      <h5>新增校正資料來源</h5>
      <div class="input-field">
        <input id="nsFile" type="text" placeholder="例如 my-words.json">
        <label for="nsFile" class="active">檔名（.json）</label>
      </div>
      <div class="input-field">
        <input id="nsAlias" type="text" placeholder="例如 我的字集">
        <label for="nsAlias" class="active">別名 alias</label>
      </div>
      <div class="input-field">
        <input id="nsDesc" type="text">
        <label for="nsDesc" class="active">說明 description（可空）</label>
      </div>
    </div>
    <div class="modal-footer">
      <a href="#!" class="modal-close btn-flat">取消</a>
      <a href="#!" id="nsCreate" class="btn deep-orange waves-effect">建立</a>
    </div>
  </div>

  <script>
    $(function () {
      var BASE = './correction-data/';
      var state = { sources: [], current: null /* {idx,item} */ };

      var $select = $('#sourceSelect');
      M.Modal.init(document.getElementById('newSourceModal'));

      // 網址帶入的 ?file= → 開啟後自動選取對應的 correction-data
      var wantFile = new URLSearchParams(location.search).get('file');

      // ---- 載入清單 ----
      function loadList(selectIdx) {
        return CorrectionLib.loadList('./correction-data.json').then(function (list) {
          state.sources = list;
          // 未指定索引但網址帶 ?file= 時，依檔名找出要預選的項目
          if (selectIdx == null && wantFile) {
            var wi = list.findIndex(function (it) { return it.file === wantFile; });
            if (wi >= 0) selectIdx = wi;
          }
          $select.empty().append('<option value="" disabled' + (selectIdx == null ? ' selected' : '') + '>請選擇校正資料來源…</option>');
          list.forEach(function (item, idx) {
            var label = (item.alias && item.alias.length ? item.alias.join(' / ') : item.file);
            var opt = $('<option>').val(idx).text(label + '（' + item.file + '）');
            if (selectIdx === idx) opt.prop('selected', true);
            $select.append(opt);
          });
          $select.formSelect();
          if (selectIdx != null) $select.trigger('change');
        }).catch(function (err) {
          M.toast({ html: '清單載入失敗：' + err.message, classes: 'red' });
        });
      }
      loadList();

      // ---- 選擇來源 → 載入條目 ----
      $select.on('change', function () {
        var idx = parseInt($select.val(), 10);
        var item = state.sources[idx];
        if (!item) return;
        state.current = { idx: idx, item: item };
        $('#fileMeta').text(item.file);
        loadEntries(item);
      });

      function loadEntries(item) {
        CorrectionLib.loadSource(item.file, BASE).then(function (rules) {
          renderEntries(rules);
          $('#editorCard, #saveBar').show();
          $('#saveStatus').text('已載入 ' + rules.length + ' 條（' + item.file + '）');
        }).catch(function (err) {
          M.toast({ html: '字集載入失敗：' + err.message, classes: 'red' });
        });
      }

      function rowHtml(sourceArr, target) {
        var srcText = (sourceArr || []).join('\n');
        return '<tr>' +
          '<td class="col-src"><textarea class="src" placeholder="一行一個原字詞"></textarea></td>' +
          '<td class="col-tgt"><input class="tgt" type="text" placeholder="校正後字詞"></td>' +
          '<td class="col-act"><a href="#!" class="del-row red-text" title="刪除"><i class="material-icons">delete</i></a></td>' +
          '</tr>';
      }

      function renderEntries(rules) {
        var $body = $('#entryBody').empty();
        rules.forEach(function (r) {
          var src = Array.isArray(r.source) ? r.source : (r.source != null ? [r.source] : []);
          var $row = $(rowHtml());
          $row.find('.src').val(src.join('\n'));
          $row.find('.tgt').val(r.target == null ? '' : r.target);
          $body.append($row);
        });
        if (!rules.length) addRow();
      }

      function addRow() {
        var $row = $(rowHtml());
        $('#entryBody').append($row);
        $row.find('.src').focus();
      }

      $('#btnAddRow').on('click', function () { addRow(); });
      $('#entryBody').on('click', '.del-row', function (e) {
        e.preventDefault();
        $(this).closest('tr').remove();
      });

      // ---- 從表格組出資料陣列 ----
      function collectRules() {
        var rules = [];
        $('#entryBody tr').each(function () {
          var src = $(this).find('.src').val()
            .split('\n').map(function (s) { return s.trim(); })
            .filter(function (s) { return s.length; });
          var target = $(this).find('.tgt').val().trim();
          if (!src.length && !target) return; // 整列空 → 略過
          rules.push({ source: src, target: target });
        });
        return rules;
      }

      function validate(rules) {
        for (var i = 0; i < rules.length; i++) {
          if (!rules[i].source.length) return '第 ' + (i + 1) + ' 條缺少 source';
          if (!rules[i].target) return '第 ' + (i + 1) + ' 條缺少 target';
        }
        return null;
      }

      // ---- 儲存 ----
      $('#btnSave').on('click', function () {
        if (!state.current) return;
        var rules = collectRules();
        var err = validate(rules);
        if (err) { M.toast({ html: err, classes: 'red' }); return; }
        var file = state.current.item.file;
        $('#saveStatus').text('儲存中…');
        $.ajax({
          url: '/api/correction/sources/' + encodeURIComponent(file),
          type: 'PUT',
          contentType: 'application/json',
          data: JSON.stringify(rules)
        }).done(function (resp) {
          var bak = resp.backupPath ? '（已備份）' : '';
          $('#saveStatus').text('已儲存 ' + rules.length + ' 條 ' + bak);
          M.toast({ html: '已儲存：' + file, classes: 'green' });
        }).fail(function (xhr) {
          var msg = (xhr.responseJSON && xhr.responseJSON.error) || xhr.statusText || '儲存失敗';
          $('#saveStatus').text('儲存失敗');
          M.toast({ html: '儲存失敗：' + msg, classes: 'red' });
        });
      });

      $('#btnReload').on('click', function () {
        if (state.current) loadEntries(state.current.item);
      });

      // ---- 新增資料來源 ----
      $('#btnNewSource').on('click', function () {
        $('#nsFile').val(''); $('#nsAlias').val(''); $('#nsDesc').val('');
        M.Modal.getInstance(document.getElementById('newSourceModal')).open();
      });

      $('#nsCreate').on('click', function () {
        var file = $('#nsFile').val().trim();
        var alias = $('#nsAlias').val().trim();
        var desc = $('#nsDesc').val().trim();
        if (!file) { M.toast({ html: '請輸入檔名', classes: 'red' }); return; }
        if (!/\.json$/i.test(file)) file += '.json';
        if (path_unsafe(file)) { M.toast({ html: '檔名不合法', classes: 'red' }); return; }
        if (_.some(state.sources, { file: file })) {
          M.toast({ html: '檔名已存在', classes: 'orange' }); return;
        }
        // 1) 建立空字集檔
        $.ajax({
          url: '/api/correction/sources/' + encodeURIComponent(file),
          type: 'PUT', contentType: 'application/json', data: JSON.stringify([])
        }).done(function () {
          // 2) 加入清單並寫回
          var newList = state.sources.slice();
          newList.push({ alias: alias ? [alias] : [file], file: file, description: desc });
          $.ajax({
            url: '/api/correction/list',
            type: 'PUT', contentType: 'application/json', data: JSON.stringify(newList)
          }).done(function () {
            M.Modal.getInstance(document.getElementById('newSourceModal')).close();
            M.toast({ html: '已建立：' + file, classes: 'green' });
            loadList(newList.length - 1); // 重新載入並選取新項目
          }).fail(failToast('寫入清單失敗'));
        }).fail(failToast('建立檔案失敗'));
      });

      function failToast(prefix) {
        return function (xhr) {
          var msg = (xhr.responseJSON && xhr.responseJSON.error) || xhr.statusText || prefix;
          M.toast({ html: prefix + '：' + msg, classes: 'red' });
        };
      }

      function path_unsafe(name) {
        return name.indexOf('/') >= 0 || name.indexOf('\\') >= 0 || name.indexOf('..') >= 0;
      }
    });
  </script>
</body>
</html>
