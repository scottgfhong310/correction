<!DOCTYPE html>
<html lang="zh-Hant">

<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
  <meta http-equiv="Pragma" content="no-cache" />
  <meta http-equiv="Expires" content="0" />
  <title>Correction — 純文字校正</title>

  <!-- 防主題閃爍：render 前先依 localStorage 設好 data-theme（預設 dark） -->
  <script>try{document.documentElement.dataset.theme=localStorage.getItem('correction-theme')||'dark'}catch(e){}</script>

  <!-- Materialize CSS -->
  <link rel="stylesheet" href="https://fonts.googleapis.com/icon?family=Material+Icons">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/materialize/1.0.0/css/materialize.min.css" />

  <!-- Noto Sans JP（僅日文介面套用，字檔在 lang=ja 時才下載） -->
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700&display=swap">

  <!-- 依賴 -->
  <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/materialize/1.0.0/js/materialize.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/lodash@4.17.21/lodash.min.js"></script>

  <!-- CorrectionLib -->
  <script src="./correction-lib.js"></script>

  <!-- i18n（引擎 + 語言檔；新增語言只要在 locales/ 加一個檔並在此引入） -->
  <script src="./i18n.js"></script>
  <script src="./locales/zh-Hant.js"></script>
  <script src="./locales/en.js"></script>
  <script src="./locales/ja.js"></script>

  <link rel="stylesheet" href="./correction.css">

  <link rel="stylesheet" href="./side-tool.css">

</head>

<body data-i18n-doctitle="title.page">
  <header>
    <nav>
      <div class="nav-wrapper teal">
        <a class="brand-logo" style="padding-left:16px;">
          <i class="material-icons left">spellcheck</i>Correction
        </a>
        <ul id="langSwitch" class="right"><!-- 依 I18n.langs 自動產生 --></ul>
        <ul class="right hide-on-med-and-down">
          <li><a id="builderLink" href="./correction-data-builder.html" target="_blank" rel="noopener"><i class="material-icons left">build</i><span data-i18n="nav.builder">編輯校正字集</span></a></li>
          <li style="width:16px;">&nbsp;</li>
        </ul>
      </div>
    </nav>
  </header>

  <div class="container wide" style="margin-top:20px;">

    <!-- 控制列：選擇校正字集 + 執行 -->
    <div class="card">
      <div class="card-content" style="padding:16px 24px;">
        <div class="toolbar">
          <div class="input-field">
            <select id="sourceSelect">
              <option value="" disabled selected data-i18n="opt.loading">載入中…</option>
            </select>
            <label data-i18n="toolbar.sourceLabel">校正資料來源（correction-data）</label>
          </div>
          <a id="btnRun" class="btn teal waves-effect waves-light disabled">
            <i class="material-icons left">play_arrow</i><span data-i18n="btn.run">執行校正</span>
          </a>
          <a id="btnReload" class="btn-flat waves-effect disabled" data-i18n-title="btn.reloadTitle" title="重新載入目前使用的校正資料來源">
            <i class="material-icons left">refresh</i><span data-i18n="btn.reload">重新載入</span>
          </a>
          <span id="sourceMeta" class="meta"></span>
        </div>
      </div>
    </div>

    <div class="row">
      <!-- 左：原始 / 上傳內容 -->
      <div class="col s12 l6">
        <div class="card">
          <div class="card-content">
            <span class="card-title"><span data-i18n="card.original">原始內容</span>
              <span id="origInfo" class="meta"></span>
            </span>
            <div id="dropZone" class="drop-zone" data-i18n-html="drop.hint">
              <i class="material-icons">cloud_upload</i>
              拖拉檔案到這裡，或<u>點擊選擇檔案</u>上傳至 /upload/correction
            </div>
            <input type="file" id="filePicker" accept=".txt,.md,.text,.csv,.json,.srt,.vtt,text/*" style="display:none;">
            <textarea id="original" class="doc" data-i18n-placeholder="ph.original" placeholder="上傳檔案後內容會顯示在這裡，也可以直接貼上文字…"></textarea>
          </div>
        </div>
      </div>

      <!-- 右：校正結果 -->
      <div class="col s12 l6">
        <div class="card">
          <div class="card-content">
            <span class="card-title"><span data-i18n="card.result">校正結果</span>
              <span id="resultInfo" class="meta"></span>
            </span>
            <textarea id="result" class="doc" data-i18n-placeholder="ph.result" placeholder="按「執行校正」後，結果會顯示在這裡…" readonly></textarea>
            <div class="stats" id="stats"></div>
          </div>
          <div class="card-action">
            <a id="btnCopy" class="btn-flat waves-effect disabled"><i class="material-icons left">content_copy</i><span data-i18n="btn.copy">複製內容</span></a>
            <a id="btnDownload" class="btn-flat waves-effect disabled"><i class="material-icons left">file_download</i><span data-i18n="btn.download">下載</span></a>
          </div>
        </div>
      </div>
    </div>
  </div>

  <!-- 右側工具列  -->
  <div id="setting-mode" class="side-tool" title="切換 light / dark">
    <i class="material-icons" style="font-size: 20px;">dark_mode</i>
  </div>

  <div id="setting-file_download" class="side-tool">
    <i class="material-icons" style="font-size: 20px;">file_download</i>
  </div>

  <div id="setting-copy" class="side-tool">
    <i class="material-icons" style="font-size: 20px;">content_copy</i>
  </div>

  <script src="./correction.js"></script>
</body>
</html>
