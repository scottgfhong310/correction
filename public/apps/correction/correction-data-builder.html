<!DOCTYPE html>
<html lang="zh-Hant">

<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
  <meta http-equiv="Pragma" content="no-cache" />
  <meta http-equiv="Expires" content="0" />
  <title>Correction — 編輯校正字集</title>

  <!-- Materialize CSS -->
  <link rel="stylesheet" href="https://fonts.googleapis.com/icon?family=Material+Icons">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/materialize/1.0.0/css/materialize.min.css" />

  <!-- Noto Sans JP（僅日文介面套用，字檔在 lang=ja 時才下載） -->
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700&display=swap">

  <!-- 依賴 -->
  <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/materialize/1.0.0/js/materialize.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/lodash@4.17.21/lodash.min.js"></script>

  <!-- CorrectionLib -->
  <script src="./correction-lib.js"></script>

  <!-- i18n（引擎 + 語言檔） -->
  <script src="./i18n.js"></script>
  <script src="./locales/zh-Hant.js"></script>
  <script src="./locales/en.js"></script>
  <script src="./locales/ja.js"></script>

  <link rel="stylesheet" href="./builder.css">
</head>

<body data-i18n-doctitle="b.title.page">
  <header>
    <nav>
      <div class="nav-wrapper deep-orange darken-1">
        <a class="brand-logo" style="padding-left:16px;">
          <i class="material-icons left">build</i><span data-i18n="b.brand">校正字集編輯</span>
        </a>
        <ul id="langSwitch" class="right"><!-- 依 I18n.langs 自動產生 --></ul>
        <ul class="right hide-on-med-and-down">
          <li><a href="./index.html"><i class="material-icons left">spellcheck</i><span data-i18n="b.nav.back">回校正頁</span></a></li>
          <li style="width:16px;">&nbsp;</li>
        </ul>
      </div>
    </nav>
  </header>

  <div class="container wide" style="margin-top:20px;">
    <div class="card">
      <div class="card-content" style="padding:16px 24px;">
        <div class="toolbar">
          <div class="input-field">
            <select id="sourceSelect">
              <option value="" disabled selected data-i18n="opt.loading">載入中…</option>
            </select>
            <label data-i18n="b.toolbar.sourceLabel">選擇校正資料來源（correction-data）</label>
          </div>
          <a id="btnNewSource" class="btn-flat waves-effect">
            <i class="material-icons left">add_circle</i><span data-i18n="b.btn.newSource">新增資料來源</span>
          </a>
          <span id="fileMeta" class="hint"></span>
        </div>
      </div>
    </div>

    <div class="card" id="editorCard" style="display:none;">
      <div class="card-content">
        <span class="card-title"><span data-i18n="b.card.entries">條目編輯</span>
          <span class="hint" data-i18n-html="b.entriesHint">— <code>source</code> 每行一個字詞，皆會被替換成 <code>target</code></span>
        </span>
        <table class="entries striped">
          <thead>
            <tr>
              <th class="col-src" data-i18n="b.th.source">source（原字詞，每行一個）</th>
              <th class="col-tgt" data-i18n="b.th.target">target（校正為）</th>
              <th class="col-act"></th>
            </tr>
          </thead>
          <tbody id="entryBody"></tbody>
        </table>
        <a id="btnAddRow" class="btn-flat waves-effect teal-text" style="margin-top:8px;">
          <i class="material-icons left">add</i><span data-i18n="b.btn.addRow">新增條目</span>
        </a>
      </div>
    </div>
  </div>

  <!-- 儲存列 -->
  <div class="save-bar" id="saveBar" style="display:none;">
    <span id="saveStatus" class="hint"></span>
    <span class="spacer"></span>
    <a id="btnReload" class="btn-flat waves-effect"><i class="material-icons left">refresh</i><span data-i18n="btn.reload">重新載入</span></a>
    <a id="btnSave" class="btn deep-orange waves-effect waves-light"><i class="material-icons left">save</i><span data-i18n="b.btn.save">儲存</span></a>
  </div>

  <!-- 新增資料來源 Modal -->
  <div id="newSourceModal" class="modal">
    <div class="modal-content">
      <h5 data-i18n="b.modal.title">新增校正資料來源</h5>
      <div class="input-field">
        <input id="nsFile" type="text" data-i18n-placeholder="b.modal.filePh" placeholder="例如 my-words.json">
        <label for="nsFile" class="active" data-i18n="b.modal.fileLabel">檔名（.json）</label>
      </div>
      <div class="input-field">
        <input id="nsAlias" type="text" data-i18n-placeholder="b.modal.aliasPh" placeholder="例如 我的字集">
        <label for="nsAlias" class="active" data-i18n="b.modal.aliasLabel">別名 alias</label>
      </div>
      <div class="input-field">
        <input id="nsDesc" type="text">
        <label for="nsDesc" class="active" data-i18n="b.modal.descLabel">說明 description（可空）</label>
      </div>
    </div>
    <div class="modal-footer">
      <a href="#!" class="modal-close btn-flat" data-i18n="b.modal.cancel">取消</a>
      <a href="#!" id="nsCreate" class="btn deep-orange waves-effect" data-i18n="b.modal.create">建立</a>
    </div>
  </div>

  <script src="./builder.js"></script>
</body>
</html>
